<!DOCTYPE html>
<html>
<head>
    <title>LiveFleet Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .system-status {
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-card h4 {
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-card p {
            font-size: 26px;
            font-weight: bold;
        }

        #risk-panel {
            margin-bottom: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        #map {
            height: 450px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #1e293b;
        }

        .alert { color: red; font-weight: bold; }
        .normal { color: lightgreen; font-weight: bold; }

    </style>
</head>

<body>

<div class="header">
    <h1>🚛 LiveFleet Monitoring Control Room</h1>
    <div id="systemStatus" class="system-status">Checking...</div>
</div>

<div class="controls">
    <input type="text" id="searchTruck" placeholder="🔍 Search Truck ID..." />
    <select id="riskFilter">
        <option value="ALL">All Trucks</option>
        <option value="CRITICAL">Critical Only</option>
        <option value="WARNING">Warning Only</option>
    </select>
</div>

<div class="stats-container">
    <div class="stat-card">
        <h4>Total Active Trucks</h4>
        <p id="totalTrucks">0</p>
    </div>
    <div class="stat-card">
        <h4>Critical Alerts</h4>
        <p id="criticalAlerts">0</p>
    </div>
    <div class="stat-card">
        <h4>Average Speed</h4>
        <p id="avgSpeed">0 km/h</p>
    </div>
    <div class="stat-card">
        <h4>Average Temperature</h4>
        <p id="avgTemp">0 °C</p>
    </div>
</div>

<div id="risk-panel">
    <h3>🚨 Live Risk Alerts (<span id="alertCount">0</span>)</h3>
    <div id="risk-content"></div>
</div>

<h3>🗺 Live Fleet Map</h3>
<div id="map"></div>

<table id="fleetTable">
    <thead>
        <tr>
            <th>Truck</th>
            <th>ETA (min)</th>
            <th>Speed</th>
            <th>Temperature</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([28.60, 77.30], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = {};
let latestRiskData = [];

async function loadStats() {
    const stats = await fetch("/stats").then(r => r.json());
    const riskSummary = await fetch("/risk-summary").then(r => r.json());

    document.getElementById("totalTrucks").innerText = stats.total_trucks || 0;
    document.getElementById("avgSpeed").innerText = (stats.avg_speed || 0) + " km/h";
    document.getElementById("avgTemp").innerText = (stats.avg_temperature || 0) + " °C";
    document.getElementById("criticalAlerts").innerText = riskSummary.CRITICAL || 0;
}

async function loadFleet() {
    const response = await fetch("/fleet");
    const data = await response.json();

    const tableBody = document.querySelector("#fleetTable tbody");
    tableBody.innerHTML = "";

    const searchValue = document.getElementById("searchTruck").value.toLowerCase();
    const filterValue = document.getElementById("riskFilter").value;

    const riskMap = {};
    latestRiskData.forEach(r => riskMap[r.truck_id] = r.risk_level);

    data.forEach(row => {

        if (searchValue && !row.truck_id.toLowerCase().includes(searchValue)) return;
        if (filterValue !== "ALL" && riskMap[row.truck_id] !== filterValue) return;

        const status = row.eta_minutes > 30 ? "DELAY" : "NORMAL";
        const statusClass = status === "DELAY" ? "alert" : "normal";

        tableBody.innerHTML += `
            <tr>
                <td>${row.truck_id}</td>
                <td>${row.eta_minutes.toFixed(2)}</td>
                <td>${row.speed}</td>
                <td>${row.temperature}</td>
                <td class="${statusClass}">${status}</td>
            </tr>
        `;
    });
}

async function loadRisk() {
    const response = await fetch("/risk");
    const data = await response.json();

    latestRiskData = data;
    document.getElementById("alertCount").innerText = data.length;

    const riskContent = document.getElementById("risk-content");
    riskContent.innerHTML = "";

    if (data.length === 0) {
        riskContent.innerHTML = `<div style="color:lightgreen;">✅ No active risks detected.</div>`;
        setSystemStatus(false);
        return;
    }

    setSystemStatus(true);

    data.forEach(truck => {
        const div = document.createElement("div");
        div.style.marginBottom = "8px";
        div.style.fontWeight = "bold";
        div.innerHTML = `🚨 Truck ${truck.truck_id} | ${truck.risk_level} | Score: ${truck.risk_score}`;
        riskContent.appendChild(div);
    });
}

function setSystemStatus(isAlert) {
    const statusDiv = document.getElementById("systemStatus");
    if (isAlert) {
        statusDiv.innerText = "🔴 ALERT MODE ACTIVE";
        statusDiv.style.background = "#7f1d1d";
        statusDiv.style.color = "red";
    } else {
        statusDiv.innerText = "🟢 SYSTEM NORMAL";
        statusDiv.style.background = "#064e3b";
        statusDiv.style.color = "lightgreen";
    }
}

async function loadMap() {
    const fleetData = await fetch("/fleet").then(r => r.json());

    const riskMap = {};
    latestRiskData.forEach(r => riskMap[r.truck_id] = r.risk_level);

    fleetData.forEach(truck => {

        let color = "green";
        if (riskMap[truck.truck_id] === "CRITICAL") color = "red";
        else if (riskMap[truck.truck_id] === "WARNING") color = "orange";

        if (markers[truck.truck_id]) {
            markers[truck.truck_id].setLatLng([truck.lat, truck.lon]);
            markers[truck.truck_id].setStyle({ color: color, fillColor: color });
        } else {
            markers[truck.truck_id] = L.circleMarker(
                [truck.lat, truck.lon],
                { radius: 8, color: color, fillColor: color, fillOpacity: 0.8 }
            )
            .bindPopup(`
                <b>Truck:</b> ${truck.truck_id}<br>
                Speed: ${truck.speed} km/h<br>
                Temp: ${truck.temperature}°C<br>
                ETA: ${truck.eta_minutes.toFixed(2)} min
            `)
            .addTo(map);
        }
    });
}

setInterval(() => {
    loadFleet();
    loadRisk();
    loadMap();
    loadStats();
}, 3000);

document.getElementById("searchTruck").addEventListener("input", loadFleet);
document.getElementById("riskFilter").addEventListener("change", loadFleet);

loadFleet();
loadRisk();
loadMap();
loadStats();

</script>

</body>
</html>
