<!DOCTYPE html>
<html>
<head>
    <title>LiveFleet Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            padding: 20px;
        }

        h1, h3 {
            margin-bottom: 10px;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: #1b1b1b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
        }

        .stat-card h4 {
            color: #aaa;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .stat-card p {
            font-size: 22px;
            font-weight: bold;
        }

        #risk-panel {
            margin-bottom: 20px;
            padding: 15px;
            background: #1b1b1b;
            border: 1px solid #444;
            border-radius: 8px;
        }

        #map {
            height: 450px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #333;
            text-align: center;
        }

        th {
            background: #222;
        }

        .alert { color: red; font-weight: bold; }
        .normal { color: lightgreen; font-weight: bold; }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚛 LiveFleet Monitoring Dashboard</h1>

<div class="stats-container">
    <div class="stat-card">
        <h4>Total Trucks</h4>
        <p id="totalTrucks">0</p>
    </div>
    <div class="stat-card">
        <h4>Critical Alerts</h4>
        <p id="criticalAlerts">0</p>
    </div>
    <div class="stat-card">
        <h4>Average Speed</h4>
        <p id="avgSpeed">0 km/h</p>
    </div>
    <div class="stat-card">
        <h4>Average Temperature</h4>
        <p id="avgTemp">0 °C</p>
    </div>
</div>

<div id="risk-panel">
    <h3>🚨 Live Risk Alerts</h3>
    <div id="risk-content">Loading...</div>
</div>

<h3>🗺 Live Fleet Map</h3>
<div id="map"></div>

<table id="fleetTable">
    <thead>
        <tr>
            <th>Truck</th>
            <th>ETA (min)</th>
            <th>Speed</th>
            <th>Temperature</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===========================
   MAP INIT
=========================== */
let map = L.map('map').setView([28.60, 77.30], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = {};

/* ===========================
   LOAD STATS
=========================== */
async function loadStats() {
    try {
        const stats = await fetch("/stats").then(r => r.json());
        const riskSummary = await fetch("/risk-summary").then(r => r.json());

        document.getElementById("totalTrucks").innerText = stats.total_trucks || 0;
        document.getElementById("avgSpeed").innerText = (stats.avg_speed || 0) + " km/h";
        document.getElementById("avgTemp").innerText = (stats.avg_temperature || 0) + " °C";
        document.getElementById("criticalAlerts").innerText = riskSummary.CRITICAL || 0;

    } catch (err) {
        console.error("Stats error:", err);
    }
}

/* ===========================
   LOAD FLEET TABLE
=========================== */
async function loadFleet() {
    try {
        const response = await fetch("/fleet");
        const data = await response.json();

        const tableBody = document.querySelector("#fleetTable tbody");
        tableBody.innerHTML = "";

        data.forEach(row => {

            const status = row.eta_minutes && row.eta_minutes > 30 ? "DELAY" : "NORMAL";
            const statusClass = status === "DELAY" ? "alert" : "normal";

            tableBody.innerHTML += `
                <tr>
                    <td>${row.truck_id}</td>
                    <td>${row.eta_minutes ? row.eta_minutes.toFixed(2) : "0.00"}</td>
                    <td>${row.speed}</td>
                    <td>${row.temperature}</td>
                    <td class="${statusClass}">${status}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error("Fleet error:", err);
    }
}

/* ===========================
   LOAD RISK ALERTS
=========================== */
async function loadRisk() {
    try {
        const response = await fetch("/risk");
        const data = await response.json();

        const riskContent = document.getElementById("risk-content");
        riskContent.innerHTML = "";

        if (!data || data.length === 0) {
            riskContent.innerHTML = `
                <div style="color:lightgreen; font-weight:bold;">
                    ✅ No active risks detected.
                </div>
            `;
            return;
        }

        data.forEach(truck => {
            const div = document.createElement("div");
            div.style.padding = "10px";
            div.style.marginBottom = "8px";
            div.style.borderRadius = "6px";
            div.style.fontWeight = "bold";

            const date = new Date(truck.time * 1000).toLocaleTimeString();

            if (truck.risk_level === "CRITICAL") {
                div.style.backgroundColor = "#4a0000";
                div.style.color = "red";
            } else {
                div.style.backgroundColor = "#3a2800";
                div.style.color = "orange";
            }

            div.innerHTML = `
                🚨 Truck ${truck.truck_id}
                | ${truck.risk_level}
                | Score: ${truck.risk_score}
                | ${date}
            `;

            riskContent.appendChild(div);
        });

    } catch (err) {
        console.error("Risk error:", err);
    }
}

/* ===========================
   LOAD MAP
=========================== */
async function loadMap() {
    try {
        const fleetData = await fetch("/fleet").then(r => r.json());
        const riskData = await fetch("/risk").then(r => r.json());

        const riskMap = {};
        riskData.forEach(r => {
            riskMap[r.truck_id] = r.risk_level;
        });

        fleetData.forEach(truck => {

            if (!truck.lat || !truck.lon) return;

            let color = "green";
            if (riskMap[truck.truck_id] === "CRITICAL") color = "red";
            else if (riskMap[truck.truck_id] === "WARNING") color = "orange";

            if (markers[truck.truck_id]) {
                markers[truck.truck_id].setLatLng([truck.lat, truck.lon]);
                markers[truck.truck_id].setStyle({ color: color, fillColor: color });
            } else {
                markers[truck.truck_id] = L.circleMarker(
                    [truck.lat, truck.lon],
                    {
                        radius: 8,
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.8
                    }
                ).addTo(map);
            }
        });

    } catch (err) {
        console.error("Map error:", err);
    }
}

/* ===========================
   AUTO REFRESH
=========================== */
setInterval(() => {
    loadFleet();
    loadRisk();
    loadMap();
    loadStats();
}, 3000);

loadFleet();
loadRisk();
loadMap();
loadStats();

</script>

</body>
</html>
